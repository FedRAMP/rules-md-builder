[project]
site_name = "FedRAMP Rules Markdown Dev Preview"
site_url = "http://localhost:8000"
site_description = "Preview the generated FedRAMP rules markdown output."
docs_dir = "output"
site_dir = ".zensical/site"
dev_addr = "localhost:8000"
use_directory_urls = true

[project.extra]
homepage = "/"

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.top",
    "navigation.tracking",
    "navigation.tabs",
    "navigation.expand",
    "navigation.path",
    "navigation.sections",
    "search.highlight",
    "toc.follow",
    "toc.integrate",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.theme.icon.tag]
rev5 = "material/numeric-5-circle-outline"
20x = "material/alpha-x-circle-outline"

[project.theme.icon.admonition]
abstract = "fontawesome/solid/gavel"


[project.markdown_extensions]
abbr = {}
admonition = {}
attr_list = {}
def_list = {}
footnotes = {}
md_in_html = {}
tables = {}

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
