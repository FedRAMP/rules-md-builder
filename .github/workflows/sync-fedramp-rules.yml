name: Sync FedRAMP Rules Submodule

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync submodule to upstream main with sparse checkout
        run: ./scripts/sync-rules-submodule.sh

      - name: Commit updated submodule pointer
        run: |
          if git diff --quiet -- rules; then
            exit 0
          fi

          git add .gitmodules rules
          git commit -m "chore: sync FedRAMP rules submodule"
          git push
